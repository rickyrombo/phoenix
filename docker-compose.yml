services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-audius}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pkg/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: cmd/api/Dockerfile
    container_name: api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-audius}
      AUDIUS_URL: ${AUDIUS_URL}
      DELEGATE_PRIVATE_KEY: ${DELEGATE_PRIVATE_KEY}
      AUDIUS_API_SECRET: ${AUDIUS_API_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AUDIUS_API_KEY: ${AUDIUS_API_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    ports:
      - "${API_PORT:-8080}:8080"
    restart: unless-stopped

  indexer:
    build:
      context: .
      dockerfile: cmd/indexer/Dockerfile
    container_name: indexer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-audius}
      AUDIUS_URL: ${AUDIUS_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped

  waveforms:
    build:
      context: .
      dockerfile: cmd/waveforms/Dockerfile
    container_name: waveform_analysis
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-audius}
      AUDIUS_URL: ${AUDIUS_URL}
      DELEGATE_PRIVATE_KEY: ${DELEGATE_PRIVATE_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    environment:
      - VITE_API_BASE_URL=${API_BASE_URL:-http://localhost:8000}
      - VITE_AUDIUS_APP_KEY=${AUDIUS_API_KEY}
      - VITE_AUDIUS_APP_NAME=${AUDIUS_APP_NAME:-Phoenix}

volumes:
  postgres_data:
